<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>흰색 배경 제거기</title>
  <style>
    :root {
      --bg-color: #1a1a1a;
      --text-color: #f0f0f0;
      --primary-color: #4f46e5;
      --border-color: #444;
      --card-bg: #2a2a2a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }

    #drop-zone {
      border: 3px dashed var(--border-color);
      border-radius: 12px;
      padding: 4rem 2rem;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      margin-bottom: 2rem;
    }

    #drop-zone.dragover {
      border-color: var(--primary-color);
      background-color: rgba(79, 70, 229, 0.1);
    }

    .canvas-container {
      margin-top: 2rem;
      padding: 1rem;
      background-color: var(--card-bg);
      border-radius: 12px;
      /* 투명도를 쉽게 확인하기 위한 체커보드 배경 */
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    canvas {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>단순 흰색 배경 제거</h1>

    <input type="file" id="file-input" class="hidden" accept="image/*">

    <div id="drop-zone">
      <p>여기에 이미지를 드래그 앤 드롭하거나 클릭하여 업로드하세요.</p>
    </div>

    <div class="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // --- 이벤트 리스너 설정 ---

    // 드래그 앤 드롭 존 클릭 시 파일 입력창 열기
    dropZone.addEventListener('click', () => fileInput.click());

    // 파일 입력창에서 파일 선택 시 처리
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    // 드래그 효과
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
    });

    // 파일 드롭 시 처리
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    // --- 핵심 로직 ---

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        alert('이미지 파일만 업로드할 수 있습니다.');
        return;
      }

      const reader = new FileReader();

      // 파일 읽기가 완료되면 실행
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          processImage(img);
        };
        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    }

    function processImage(img) {
      // 1. 캔버스 크기를 이미지 크기에 맞춥니다.
      canvas.width = img.width;
      canvas.height = img.height;

      // 2. 이미지를 캔버스에 그립니다.
      ctx.drawImage(img, 0, 0);

      // 3. 캔버스에서 픽셀 데이터를 가져옵니다.
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data; // [R, G, B, A, R, G, B, A, ...] 형태의 배열

      // 4. 모든 픽셀을 순회합니다.
      // i는 4씩 증가시켜 각 픽셀(R, G, B, A)을 처리합니다.
      for (let i = 0; i < data.length; i += 4) {
        const red = data[i];
        const green = data[i + 1];
        const blue = data[i + 2];

        // 5. 픽셀이 흰색에 가까운지 확인합니다. (약간의 오차를 허용하기 위해 240 이상으로 설정)
        if (red > 240 && green > 240 && blue > 240) {
          // 흰색 픽셀의 Alpha(투명도) 값을 0(완전 투명)으로 설정합니다.
          data[i + 3] = 0;
        }
      }

      // 6. 수정된 픽셀 데이터를 다시 캔버스에 적용합니다.
      ctx.putImageData(imageData, 0, 0);
    }
  </script>

</body>

</html>
