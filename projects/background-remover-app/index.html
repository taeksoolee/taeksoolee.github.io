<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07071a;
      --surface:      rgba(255,255,255,0.04);
      --border:       rgba(255,255,255,0.08);
      --primary:      #2563eb;
      --sky:          #0ea5e9;
      --text:         #f8fafc;
      --muted:        #94a3b8;
      --dim:          #475569;
      /* legacy aliases */
      --bg-color:     #07071a;
      --text-color:   #f8fafc;
      --primary-color:#2563eb;
      --border-color: rgba(255,255,255,0.08);
      --card-bg:      rgba(255,255,255,0.04);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* orbs */
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    body::before {
      top: -15%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
    }
    body::after {
      bottom: -15%; right: -10%; width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(14,165,233,0.07) 0%, transparent 70%);
    }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 860px;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
      text-align: center;
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    #drop-zone {
      width: 100%;
      border: 2px dashed rgba(37,99,235,0.4);
      border-radius: 20px;
      padding: 60px 24px;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(37,99,235,0.03);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    #drop-zone .drop-icon { font-size: 40px; color: #2563eb; }
    #drop-zone p { font-size: 15px; color: var(--muted); }
    #drop-zone small { font-size: 12px; color: var(--dim); }

    #drop-zone.dragover {
      border-color: rgba(37,99,235,0.8);
      background: rgba(37,99,235,0.08);
    }

    .status-text {
      font-size: 14px; min-height: 22px;
      color: var(--muted);
      padding: 10px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      display: inline-block;
    }

    .loader {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* buttons */
    button {
      font-family: inherit;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: all 0.18s;
    }
    button:hover { border-color: rgba(37,99,235,0.5); background: rgba(37,99,235,0.1); color: #93c5fd; }

    /* action buttons — override inline styles */
    button[style*="primary-color"] {
      background: var(--primary) !important;
      border-color: var(--primary) !important;
      color: #fff !important;
      box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    }
    button[style*="primary-color"]:hover {
      background: #1d4ed8 !important;
    }
    button[style*="#888"] {
      background: rgba(255,255,255,0.06) !important;
      border-color: rgba(255,255,255,0.12) !important;
      color: var(--muted) !important;
    }

    .image-results {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 560px) {
      .image-results { grid-template-columns: 1fr; }
    }

    .image-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: left;
      transition: border-color 0.2s;
    }
    .image-box:hover { border-color: rgba(37,99,235,0.35); }
    .image-box h3 {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 12px;
    }

    /* checkerboard for transparent bg preview */
    .image-box:last-child {
      background-image:
        linear-gradient(45deg, #1a1a2e 25%, transparent 25%),
        linear-gradient(-45deg, #1a1a2e 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a1a2e 75%),
        linear-gradient(-45deg, transparent 75%, #1a1a2e 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    img {
      max-width: 100%; height: auto;
      border-radius: 10px; display: block;
    }

    footer {
      font-size: 13px; color: var(--dim);
      padding-top: 20px;
      border-top: 1px solid var(--border);
      width: 100%;
    }
    footer a { color: #60a5fa; }
    footer a:hover { color: #93c5fd; }

    .hidden { display: none; }
  </style>
</head>

<body>

  <div class="container" x-data="imageProcessor()" x-init="init()">
    <h1>AI 배경 제거</h1>

    <template x-if="!isLoaded">
      <div>
        <p class="status-text" x-text="status"></p>
      </div>
    </template>
    <template x-if="isLoaded">
      <div>
        <p class="status-text" x-text="status"></p>

        <input type="file" id="file-input" @change="handleFileSelect" accept="image/*" class="hidden">

        <div x-show="originalImageUrl === null" id="drop-zone" @click="document.getElementById('file-input').click()" @dragover.prevent="isDragging = true" @dragleave.prevent="isDragging = false" @drop.prevent="handleFileDrop" :class="{ 'dragover': isDragging }">
          <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
          <p>이미지를 드래그하거나 클릭해서 선택</p>
          <small>PNG · JPG · WEBP 지원</small>
        </div>



        <div x-show="isLoading" class="loader"></div>
        <button x-show="originalImage && !isLoading && resultImageUrl === null" @click="handleRemovalBgBtn()" style="margin-top: 1rem; padding: 0.5rem 1rem; background-color: var(--primary-color); color: white; border: none; border-radius: 6px; cursor: pointer;">
          배경 제거 시작
        </button>
        <button x-show="originalImage && !isLoading" @click="resetImages()" style="margin-top: 1rem; margin-left: 1rem; padding: 0.5rem 1rem; background-color: #888; color: white; border: none; border-radius: 6px; cursor: pointer;">
          이미지 재업로드
        </button>

        <div class="image-results">
          <div x-show="originalImage" class="image-box">
            <h3>원본 이미지</h3>
            <img :src="originalImageUrl" alt="Original Image">
          </div>
          <div x-show="resultImage" class="image-box">
            <h3>배경 제거된 이미지</h3>
            <img :src="resultImageUrl" alt="Background Removed Image">
          </div>
        </div>

        <footer>
          Powered by
          <template x-for="(item, index) in powereds" :key="item.name">
            <span>
              <span x-show="index !== 0"> & </span>
              <a :href="item.url" target="_blank" style="color: var(--primary-color);" x-text="item.name"></a>
            </span>
          </template>
        </footer>
      </div>
    </template>
  </div>

  <script src="./app.mjs" type="module"></script>

</body>

</html>
