<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImgBB Uploader</title>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
  <script src="//unpkg.com/alpinejs" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.2.0/dexie.min.js" integrity="sha512-LuXLH9xON6/aAGYxi4Z1Dx8588Z80gY3iMmGtUlYmblUc1ulC/cGHuANXIvm8fnIWp5ShUk2MRBIWylGguXF9g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07071a;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --primary: #2563eb;
      --sky:     #0ea5e9;
      --text:    #f8fafc;
      --muted:   #94a3b8;
      --dim:     #475569;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 60px 16px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    }
    body::before {
      top: -15%; left: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
    }
    body::after {
      bottom: -15%; right: -10%; width: 55vw; height: 55vw;
      background: radial-gradient(circle, rgba(14,165,233,0.07) 0%, transparent 70%);
    }

    .page {
      position: relative; z-index: 1;
      max-width: 680px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 32px;
    }

    /* header */
    .page-header { text-align: center; }
    .page-header h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(28px, 5vw, 40px); font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-header p {
      margin-top: 8px; font-size: 14px; color: var(--muted);
    }
    .page-header .links {
      display: flex; justify-content: center; gap: 16px; margin-top: 12px; flex-wrap: wrap;
    }
    .page-header .links a {
      font-size: 12px; font-weight: 600; color: #60a5fa;
      display: inline-flex; align-items: center; gap: 5px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .page-header .links a:hover { color: #93c5fd; }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .card-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim);
      display: flex; align-items: center; gap: 8px;
    }
    .card-title i { color: var(--primary); }

    /* inputs */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--dim);
    }
    input[type="text"], input[type="file"] {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit; font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: #334155; }
    input[type="text"]:focus, input[type="file"]:focus { border-color: rgba(37,99,235,0.6); }
    input[type="text"]:disabled, input[type="file"]:disabled { opacity: 0.4; cursor: not-allowed; }

    input[type="file"] { cursor: pointer; padding: 10px 14px; }
    input[type="file"]::-webkit-file-upload-button {
      background: rgba(37,99,235,0.2);
      border: 1px solid rgba(37,99,235,0.35);
      border-radius: 6px;
      color: #93c5fd;
      font-family: inherit; font-size: 12px; font-weight: 600;
      padding: 5px 12px; cursor: pointer;
      transition: background 0.18s;
      margin-right: 10px;
    }
    input[type="file"]::-webkit-file-upload-button:hover { background: rgba(37,99,235,0.35); }

    /* buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 22px; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      transition: all 0.18s; width: 100%;
    }
    .btn:hover { border-color: rgba(37,99,235,0.5); background: rgba(37,99,235,0.1); color: #93c5fd; }
    .btn.primary {
      background: var(--primary); border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(37,99,235,0.3);
    }
    .btn.primary:hover { background: #1d4ed8; }
    .btn.primary[aria-busy="true"] { opacity: 0.6; pointer-events: none; }

    /* divider */
    .divider { height: 1px; background: var(--border); }

    /* success dialog */
    dialog {
      background: rgba(10,10,30,0.98);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 20px;
      color: var(--text);
      padding: 0;
      max-width: 380px; width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    }
    dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    dialog article { padding: 28px; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
    dialog h3 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; }
    dialog p { font-size: 14px; color: var(--muted); }
    .success-icon { font-size: 52px; color: #22c55e; }

    /* gallery */
    .gallery-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .gallery-item {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .gallery-item:hover { border-color: rgba(37,99,235,0.4); transform: translateY(-2px); }
    .gallery-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .gallery-item-info { padding: 10px 12px; }
    .gallery-item-title {
      font-size: 12px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .gallery-item-meta {
      display: flex; align-items: center; justify-content: space-between;
    }
    .gallery-item-size { font-size: 10px; color: var(--dim); }
    .gallery-item-link {
      font-size: 10px; font-weight: 600; color: #60a5fa;
      text-decoration: none; display: inline-flex; align-items: center; gap: 3px;
    }
    .gallery-item-link:hover { color: #93c5fd; }

    .empty-gallery {
      text-align: center; padding: 40px;
      color: var(--dim); font-size: 14px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .empty-gallery i { font-size: 32px; }
  </style>
</head>

<body>
  <div class="page">
    <!-- header -->
    <div class="page-header">
      <h1>ImgBB Uploader</h1>
      <p>이미지를 ImgBB에 업로드하고 로컬에 이력을 보관합니다</p>
      <div class="links">
        <a href="https://imgbb.com/" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-arrow-up-right-from-square"></i> ImgBB
        </a>
        <a href="https://api.imgbb.com/" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-book"></i> API Docs
        </a>
      </div>
    </div>

    <main x-data="{
      key: $persist(''),
      db: null,
    }" x-init="() => {
      db = new Dexie('imgbbDB');
      db.version(1).stores({
        images: '++id, title, url_viewer, url, display_url, width, height, size, time, expiration, delete_url'
      });
    }">

      <!-- API Key -->
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-key"></i> API Key</div>
        <div class="field">
          <label>ImgBB API Key</label>
          <input x-model="key" type="text" placeholder="your-api-key-here" />
        </div>
      </div>

      <!-- Upload -->
      <div class="card" x-data="{
        filename: '',
        image: null,
        isLoading: false,
        isOpenedSuccessModal: false,
        imageFileInput: null,
      }">
        <div class="card-title"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</div>

        <form name="uploadForm" @submit.prevent="async () => {
          if (!key) { alert('Please enter your API Key.'); return; }
          if (!filename) { alert('Please enter a filename.'); return; }
          if (!image) { alert('Please select an image file.'); return; }

          isLoading = true;
          try {
            const formData = new FormData();
            formData.append('key', key);
            formData.append('name', filename + '.jpeg');
            formData.append('image', image);

            const result = await fetch('https://api.imgbb.com/1/upload', {
              method: 'POST',
              body: formData,
            }).then(response => response.json());

            if (!result.success) throw new Error('Invalid API Key or Upload Error');

            filename = '';
            image = null;
            $refs.imageFileInput.value = '';

            await db.images.add(result.data);
            isOpenedSuccessModal = true;
          } catch (error) {
            console.log(error);
            alert('Upload failed: ' + error.message);
          } finally {
            isLoading = false;
          }
        }" style="display:flex;flex-direction:column;gap:16px;">

          <div class="field">
            <label>파일 이름</label>
            <input type="text" name="filename" x-model="filename" :disabled="isLoading" placeholder="image-name" />
          </div>

          <div class="field">
            <label>이미지 파일</label>
            <input type="file" name="image" accept="image/*" @change="image = $event.target.files[0]" x-ref="imageFileInput" :disabled="isLoading" />
          </div>

          <button type="submit" class="btn primary" :aria-busy="isLoading">
            <i class="fa-solid fa-upload" x-show="!isLoading"></i>
            <i class="fa-solid fa-spinner fa-spin" x-show="isLoading"></i>
            <span x-text="isLoading ? '업로드 중...' : 'Upload to ImgBB'"></span>
          </button>
        </form>

        <!-- Success dialog -->
        <dialog :open="isOpenedSuccessModal">
          <article>
            <i class="fa-solid fa-circle-check success-icon"></i>
            <h3>업로드 완료!</h3>
            <p>이미지가 ImgBB에 성공적으로 업로드되었습니다.</p>
            <button class="btn primary" @click="isOpenedSuccessModal = false" style="width:auto;padding:9px 28px;">
              확인
            </button>
          </article>
        </dialog>
      </div>

      <!-- Gallery -->
      <div class="card" x-data="{ images: [] }">
        <div class="gallery-header">
          <div class="card-title"><i class="fa-solid fa-images"></i> 업로드 이력</div>
          <button class="btn" style="width:auto;padding:8px 16px;font-size:13px;"
            @click="async () => { images = await db.images.toArray(); }">
            <i class="fa-solid fa-rotate-right"></i> 불러오기
          </button>
        </div>

        <template x-if="images.length === 0">
          <div class="empty-gallery">
            <i class="fa-regular fa-images"></i>
            불러오기 버튼을 눌러 업로드 이력을 확인하세요
          </div>
        </template>

        <div class="gallery-grid" x-show="images.length > 0">
          <template x-for="img in images" :key="img.id">
            <div class="gallery-item">
              <img :src="img.url" :alt="img.title" />
              <div class="gallery-item-info">
                <div class="gallery-item-title" x-text="img.title"></div>
                <div class="gallery-item-meta">
                  <span class="gallery-item-size" x-text="(img.size / 1024).toFixed(1) + ' KB'"></span>
                  <a class="gallery-item-link" :href="img.url_viewer" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> View
                  </a>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

    </main>
  </div>
</body>

</html>
