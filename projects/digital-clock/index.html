<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main>
    <div class="clock-glow"></div>

    <div class="clock-row">
      <span class="clock-h"></span>
      <span class="clock-sep">:</span>
      <span class="clock-m"></span>
    </div>

    <div class="clock-meta">
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-divider"></div>
      <div class="clock-day"  id="clock-day"></div>
    </div>

    <div class="sec-bar-wrap">
      <div class="sec-bar-bg">
        <div class="sec-bar" id="sec-bar"></div>
      </div>
      <span class="sec-label" id="sec-label">00s</span>
    </div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
