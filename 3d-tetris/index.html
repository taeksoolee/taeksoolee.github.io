<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ultimate 3D Tetris</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        h1 { margin: 0 0 5px 0; font-size: 38px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); color: #fff; letter-spacing: 2px;}
        .stat { font-size: 22px; color: #00ffcc; margin-bottom: 5px; font-weight: bold; }
        .stat span { color: #fff; }
        .instructions { margin-top: 20px; font-size: 14px; color: #888; line-height: 1.6; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; font-size: 12px; }
        #gameover { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 15px; border: 2px solid #ff0055; box-shadow: 0 0 30px rgba(255, 0, 85, 0.5); z-index: 20;}
        #gameover h2 { margin: 0 0 15px 0; color: #ff0055; font-size: 48px; }
        #restartBtn { margin-top: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; background: #00ffcc; border: none; border-radius: 5px; color: #000; font-weight: bold; pointer-events: auto; }
        #restartBtn:hover { background: #fff; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>3D TETRIS</h1>
        <div class="stat" id="scoreDisplay">Score: <span>0</span></div>
        <div class="stat" id="levelDisplay">Level: <span>1</span></div>
        <div class="stat" id="linesDisplay">Lines: <span>0</span></div>
        <div class="instructions">
            <kbd>←</kbd> <kbd>→</kbd> : 좌우 이동<br>
            <kbd>↑</kbd> : 블록 회전<br>
            <kbd>↓</kbd> : 소프트 드롭<br>
            <kbd>Space</kbd> : 하드 드롭
        </div>
    </div>

    <div id="gameover">
        <h2>GAME OVER</h2>
        <div class="stat" id="finalScore">Final Score: <span>0</span></div>
        <button id="restartBtn" onclick="location.reload()">다시 시작</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- 1. 기본 설정 (Scene, Camera, Renderer) ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 28);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- 2. 조명 (Lighting) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(15, 30, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -20; dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20; dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x00ffcc, 3, 50);
        pointLight.position.set(0, 10, 5);
        scene.add(pointLight);

        // --- 3. 게임 시스템 변수 ---
        const COLS = 10;
        const ROWS = 20;
        const OFFSET_X = -COLS / 2 + 0.5;
        const OFFSET_Y = -ROWS / 2 + 0.5;

        const board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        const boardMeshes = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
        const particles = []; // 파티클 배열

        const TETROMINOES = [
            { shape: [[1,1,1,1]], color: 0x00ffff }, // I (Cyan)
            { shape: [[1,1],[1,1]], color: 0xffff00 }, // O (Yellow)
            { shape: [[0,1,0],[1,1,1]], color: 0xaa00ff }, // T (Purple)
            { shape: [[0,1,1],[1,1,0]], color: 0x00ff00 }, // S (Green)
            { shape: [[1,1,0],[0,1,1]], color: 0xff0055 }, // Z (Red/Pink)
            { shape: [[1,0,0],[1,1,1]], color: 0xffa500 }, // L (Orange)
            { shape: [[0,0,1],[1,1,1]], color: 0x0055ff }  // J (Blue)
        ];

        let currentPiece = null;
        let ghostPieceMeshes = [];
        
        let score = 0;
        let linesClearedTotal = 0;
        let level = 1;
        let dropInterval = 1000;
        let isGameOver = false;

        // --- 4. 맵 프레임 디자인 ---
        function createBoardFrame() {
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.5 });
            
            // 바닥 및 양쪽 벽
            const bottom = new THREE.Mesh(new THREE.BoxGeometry(COLS + 1, 1, 3), frameMat);
            bottom.position.set(0, OFFSET_Y - 1, -0.5);
            bottom.receiveShadow = true;
            scene.add(bottom);

            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(1, ROWS, 3), frameMat);
            leftWall.position.set(OFFSET_X - 1, 0, -0.5);
            scene.add(leftWall);

            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(1, ROWS, 3), frameMat);
            rightWall.position.set(-OFFSET_X + 1, 0, -0.5);
            scene.add(rightWall);
            
            // 뒷배경 격자
            const gridHelper = new THREE.GridHelper(20, 20, 0x333333, 0x111111);
            gridHelper.rotation.x = Math.PI / 2;
            gridHelper.position.set(0, 0, -2.1);
            scene.add(gridHelper);
        }
        createBoardFrame();

        // --- 5. 블록 및 파티클 생성 ---
        function createBlockMesh(color, isGhost = false) {
            const size = 0.96;
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                transparent: isGhost,
                opacity: isGhost ? 0.2 : 1.0,
                roughness: 0.1,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            if (!isGhost) {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true }));
                mesh.add(line);
            }
            return mesh;
        }

        // 파티클(폭발) 생성 함수
        function createExplosion(x, y, color) {
            const pos = getScenePosition(x, y);
            const particleCount = 6;
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            const mat = new THREE.MeshStandardMaterial({ color: color, transparent: true });

            for (let i = 0; i < particleCount; i++) {
                const mesh = new THREE.Mesh(geo, mat.clone()); // 각각 투명도 조절을 위해 clone
                mesh.position.set(pos.x, pos.y, 0);
                scene.add(mesh);

                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    Math.random() * 0.3 + 0.1, // 위로 튀어오름
                    (Math.random() - 0.5) * 0.3 + 0.2 // 앞으로 튀어나옴
                );

                particles.push({ mesh, velocity, life: 1.0 });
            }
        }

        function getScenePosition(x, y) {
            return { x: x + OFFSET_X, y: y + OFFSET_Y };
        }

        // 메모리 관리를 위한 리소스 제거 유틸
        function disposeMesh(mesh) {
            scene.remove(mesh);
            if (mesh.geometry) mesh.geometry.dispose();
            if (mesh.material) {
                if(Array.isArray(mesh.material)) mesh.material.forEach(m => m.dispose());
                else mesh.material.dispose();
            }
        }

        // --- 6. 게임 코어 로직 ---
        function spawnPiece() {
            const type = TETROMINOES[Math.floor(Math.random() * TETROMINOES.length)];
            currentPiece = {
                shape: type.shape, color: type.color,
                x: Math.floor(COLS / 2) - Math.floor(type.shape[0].length / 2),
                y: ROWS - type.shape.length,
                meshes: []
            };

            // 스폰되자마자 충돌하면 게임 오버
            if (checkCollision(currentPiece.x, currentPiece.y, currentPiece.shape)) {
                gameOver();
                return;
            }
            updatePieceMeshes();
        }

        function updatePieceMeshes() {
            currentPiece.meshes.forEach(m => disposeMesh(m));
            ghostPieceMeshes.forEach(m => disposeMesh(m));
            currentPiece.meshes = [];
            ghostPieceMeshes = [];

            // 고스트 블록 Y 위치 계산
            let ghostY = currentPiece.y;
            while (!checkCollision(currentPiece.x, ghostY - 1, currentPiece.shape)) {
                ghostY--;
            }

            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        // 실제 블록
                        const realPos = getScenePosition(currentPiece.x + dx, currentPiece.y - dy);
                        const mesh = createBlockMesh(currentPiece.color);
                        mesh.position.set(realPos.x, realPos.y, 0);
                        scene.add(mesh);
                        currentPiece.meshes.push(mesh);

                        // 고스트 블록
                        const ghostPos = getScenePosition(currentPiece.x + dx, ghostY - dy);
                        const ghostMesh = createBlockMesh(currentPiece.color, true);
                        ghostMesh.position.set(ghostPos.x, ghostPos.y, 0);
                        scene.add(ghostMesh);
                        ghostPieceMeshes.push(ghostMesh);
                    }
                });
            });
        }

        function checkCollision(targetX, targetY, targetShape) {
            return targetShape.some((row, dy) => {
                return row.some((value, dx) => {
                    if (!value) return false;
                    const newX = targetX + dx;
                    const newY = targetY - dy;
                    return newX < 0 || newX >= COLS || newY < 0 || (newY < ROWS && board[newY][newX]);
                });
            });
        }

        function lockPiece() {
            // 보드 배열에 기록 및 메쉬 고정
            currentPiece.shape.forEach((row, dy) => {
                row.forEach((value, dx) => {
                    if (value) {
                        const boardX = currentPiece.x + dx;
                        const boardY = currentPiece.y - dy;
                        board[boardY][boardX] = currentPiece.color;
                        
                        const pos = getScenePosition(boardX, boardY);
                        const mesh = createBlockMesh(currentPiece.color);
                        mesh.position.set(pos.x, pos.y, 0);
                        scene.add(mesh);
                        boardMeshes[boardY][boardX] = mesh;
                    }
                });
            });

            // 현재 조작중이던 메쉬 삭제
            currentPiece.meshes.forEach(m => disposeMesh(m));
            ghostPieceMeshes.forEach(m => disposeMesh(m));
            
            clearLines();
            if (!isGameOver) spawnPiece();
        }

        function clearLines() {
            let linesCleared = 0;
            for (let y = 0; y < ROWS; y++) {
                if (board[y].every(cell => cell !== 0)) {
                    // 폭발 파티클 생성 및 메쉬 제거
                    for (let x = 0; x < COLS; x++) {
                        createExplosion(x, y, board[y][x]);
                        disposeMesh(boardMeshes[y][x]);
                    }
                    
                    // 배열 당기기
                    board.splice(y, 1);
                    board.push(Array(COLS).fill(0));
                    
                    boardMeshes.splice(y, 1);
                    boardMeshes.push(Array(COLS).fill(null));

                    linesCleared++;
                    y--; // 당겨진 줄을 다시 검사
                }
            }

            if (linesCleared > 0) {
                // 점수 계산 (많이 깰수록 보너스 배율)
                const basePoints = [0, 100, 300, 500, 800];
                score += basePoints[linesCleared] * level;
                linesClearedTotal += linesCleared;
                
                // 레벨업 시스템 (10줄마다 1레벨 상승, 속도 증가)
                level = Math.floor(linesClearedTotal / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 120);

                // UI 업데이트
                document.querySelector('#scoreDisplay span').innerText = score;
                document.querySelector('#levelDisplay span').innerText = level;
                document.querySelector('#linesDisplay span').innerText = linesClearedTotal;
                
                // 공중에 뜬 블록들 Y좌표 실제 갱신
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        if (boardMeshes[y][x]) {
                            // 애니메이션을 넣으면 더 좋지만, 여기서는 즉각 이동
                            boardMeshes[y][x].position.y = getScenePosition(x, y).y;
                        }
                    }
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('gameover').style.display = 'block';
            document.querySelector('#finalScore span').innerText = score;
        }

        // --- 7. 키보드 컨트롤 ---
        window.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            
            let needsUpdate = false;
            
            if (e.key === 'ArrowLeft') {
                if (!checkCollision(currentPiece.x - 1, currentPiece.y, currentPiece.shape)) {
                    currentPiece.x--; needsUpdate = true;
                }
            } else if (e.key === 'ArrowRight') {
                if (!checkCollision(currentPiece.x + 1, currentPiece.y, currentPiece.shape)) {
                    currentPiece.x++; needsUpdate = true;
                }
            } else if (e.key === 'ArrowDown') {
                if (!checkCollision(currentPiece.x, currentPiece.y - 1, currentPiece.shape)) {
                    currentPiece.y--; needsUpdate = true;
                    score += 1; // 소프트 드롭 점수
                    document.querySelector('#scoreDisplay span').innerText = score;
                }
            } else if (e.key === 'ArrowUp') {
                // 배열 90도 회전
                const rotated = currentPiece.shape[0].map((_, i) => currentPiece.shape.map(row => row[i]).reverse());
                if (!checkCollision(currentPiece.x, currentPiece.y, rotated)) {
                    currentPiece.shape = rotated; needsUpdate = true;
                }
            } else if (e.key === ' ') {
                // 하드 드롭
                let dropDistance = 0;
                while (!checkCollision(currentPiece.x, currentPiece.y - 1, currentPiece.shape)) {
                    currentPiece.y--;
                    dropDistance++;
                }
                score += dropDistance * 2; // 하드 드롭 보너스
                document.querySelector('#scoreDisplay span').innerText = score;
                lockPiece();
                needsUpdate = false;
            }

            if (needsUpdate) updatePieceMeshes();
        });

        // --- 8. 메인 애니메이션 루프 ---
        let lastTime = 0;
        let dropCounter = 0;

        function animate(time = 0) {
            requestAnimationFrame(animate);

            // 탭 비활성화 시 시간이 튀는 것 방지 (최대 100ms로 제한)
            const deltaTime = Math.min(time - lastTime, 100); 
            lastTime = time;

            // 게임 진행 로직
            if (!isGameOver) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) {
                    if (!checkCollision(currentPiece.x, currentPiece.y - 1, currentPiece.shape)) {
                        currentPiece.y--;
                        updatePieceMeshes();
                    } else {
                        lockPiece();
                    }
                    dropCounter = 0;
                }
            }

            // 카메라 다이나믹 무빙 (선택적)
            const cameraTargetX = isGameOver ? 0 : Math.sin(time * 0.0003) * 2;
            camera.position.x += (cameraTargetX - camera.position.x) * 0.05;
            camera.lookAt(0, 0, 0);

            // 파티클(폭발) 애니메이션 처리
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.velocity.y -= 0.015; // 중력 적용
                p.mesh.rotation.x += 0.1;
                p.mesh.rotation.y += 0.1;
                p.life -= 0.03; // 수명 감소
                
                p.mesh.material.opacity = p.life;

                if (p.life <= 0) {
                    disposeMesh(p.mesh);
                    particles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // 브라우저 크기 조절 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 게임 시작
        spawnPiece();
        animate();
    </script>
</body>
</html>
